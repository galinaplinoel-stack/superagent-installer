<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myfurina Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a1628;
            --bg-card: #0d1f3c;
            --hydro-blue: #1a6fb5;
            --hydro-light: #4fc3f7;
            --hydro-glow: #81d4fa;
            --hydro-pale: #b3e5fc;
            --gold: #d4a853;
            --text: #e8f4fd;
            --text-dim: #90caf9;
            --green: #4caf50;
            --red: #f44336;
            --orange: #ff9800;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: rgba(13,31,60,0.9);
            border-bottom: 1px solid rgba(79,195,247,0.2);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--hydro-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hostname {
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid rgba(79,195,247,0.15);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--hydro-light);
        }
        .stat-label {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .agents-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--hydro-pale);
        }
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .agent-card {
            background: var(--bg-card);
            border: 1px solid rgba(79,195,247,0.15);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        .agent-card:hover {
            border-color: rgba(79,195,247,0.4);
            box-shadow: 0 4px 20px rgba(79,195,247,0.1);
        }
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .agent-name {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-running {
            background: rgba(76,175,80,0.15);
            color: var(--green);
            border: 1px solid rgba(76,175,80,0.3);
        }
        .status-stopped {
            background: rgba(244,67,54,0.15);
            color: var(--red);
            border: 1px solid rgba(244,67,54,0.3);
        }
        .status-unknown {
            background: rgba(255,152,0,0.15);
            color: var(--orange);
            border: 1px solid rgba(255,152,0,0.3);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        .status-running .status-dot { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .agent-details {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        .detail-label {
            color: var(--text-dim);
        }
        .detail-value {
            color: var(--text);
            font-family: monospace;
        }
        .agent-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(79,195,247,0.1);
        }
        .btn {
            flex: 1;
            padding: 0.6rem;
            border: 1px solid rgba(79,195,247,0.3);
            border-radius: 6px;
            background: transparent;
            color: var(--hydro-light);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: rgba(79,195,247,0.1);
        }
        .btn-start { border-color: rgba(76,175,80,0.4); color: var(--green); }
        .btn-start:hover { background: rgba(76,175,80,0.1); }
        .btn-stop { border-color: rgba(244,67,54,0.4); color: var(--red); }
        .btn-stop:hover { background: rgba(244,67,54,0.1); }
        .btn-logs { border-color: rgba(255,152,0,0.4); color: var(--orange); }
        .btn-logs:hover { background: rgba(255,152,0,0.1); }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }
        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--hydro-pale);
        }
        .empty-state code {
            display: block;
            background: rgba(10,22,40,0.8);
            border: 1px solid rgba(79,195,247,0.15);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            color: var(--hydro-light);
            font-size: 0.9rem;
        }
        .last-updated {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .agents-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Myfurina Dashboard</div>
        <div class="hostname" id="hostname">Loading...</div>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-agents">-</div>
                <div class="stat-label">Total Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="running-agents">-</div>
                <div class="stat-label">Running</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stopped-agents">-</div>
                <div class="stat-label">Stopped</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uptime">-</div>
                <div class="stat-label">Dashboard Uptime</div>
            </div>
        </div>

        <h2 class="agents-title">Agents</h2>
        <div class="agents-grid" id="agents-grid">
            <div class="empty-state">
                <h3>No agents yet</h3>
                <p>Create your first agent:</p>
                <code>myfurina create my-agent</code>
            </div>
        </div>

        <div class="last-updated" id="last-updated"></div>
    </div>

    <script>
        const startTime = Date.now();

        function formatUptime(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            if (hours > 0) return `${hours}h ${minutes % 60}m`;
            if (minutes > 0) return `${minutes}m ${seconds % 60}s`;
            return `${seconds}s`;
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/status.json?t=' + Date.now());
                if (!res.ok) return null;
                return await res.json();
            } catch {
                return null;
            }
        }

        // [FIX #7] Escape HTML to prevent XSS
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function createAgentCard(agent) {
            const statusClass = agent.status === 'running' ? 'status-running' :
                               agent.status === 'stopped' ? 'status-stopped' : 'status-unknown';

            const safeName = escapeHtml(agent.name);
            const safeStatus = escapeHtml(agent.status || 'unknown');
            const safeModel = escapeHtml(agent.model || 'N/A');
            const safeChat = escapeHtml(agent.telegram_chat || 'N/A');
            const safeProfile = escapeHtml(agent.profile || 'default');
            const safeDate = agent.created ? escapeHtml(new Date(agent.created).toLocaleDateString()) : 'N/A';

            return `
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="agent-name">${safeName}</div>
                        <div class="status-badge ${statusClass}">
                            <div class="status-dot"></div>
                            ${safeStatus}
                        </div>
                    </div>
                    <div class="agent-details">
                        <div class="detail-row">
                            <span class="detail-label">Model</span>
                            <span class="detail-value">${safeModel}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Chat ID</span>
                            <span class="detail-value">${safeChat}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Profile</span>
                            <span class="detail-value">${safeProfile}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Created</span>
                            <span class="detail-value">${safeDate}</span>
                        </div>
                    </div>
                    <div class="agent-actions">
                        <button class="btn btn-start" onclick="agentAction('start', '${safeName}')">Start</button>
                        <button class="btn btn-stop" onclick="agentAction('stop', '${safeName}')">Stop</button>
                        <button class="btn btn-logs" onclick="agentAction('logs', '${safeName}')">Logs</button>
                    </div>
                </div>
            `;
        }

        async function updateDashboard() {
            const data = await fetchStatus();
            if (!data) return;

            // Update hostname
            document.getElementById('hostname').textContent = data.hostname || 'Unknown';

            // Update stats
            const agents = data.agents || [];
            const running = agents.filter(a => a.status === 'running').length;
            const stopped = agents.filter(a => a.status === 'stopped').length;

            document.getElementById('total-agents').textContent = agents.length;
            document.getElementById('running-agents').textContent = running;
            document.getElementById('stopped-agents').textContent = stopped;
            document.getElementById('uptime').textContent = formatUptime(Date.now() - startTime);

            // Update agents grid
            const grid = document.getElementById('agents-grid');
            if (agents.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>No agents yet</h3>
                        <p>Create your first agent:</p>
                        <code>myfurina create my-agent</code>
                    </div>
                `;
            } else {
                grid.innerHTML = agents.map(createAgentCard).join('');
            }

            // Update timestamp
            document.getElementById('last-updated').textContent =
                `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        function agentAction(action, name) {
            alert(`Run in terminal:\nmyfurina ${action} ${name}`);
        }

        // Initial load
        updateDashboard();

        // Auto-refresh every 10 seconds
        setInterval(updateDashboard, 10000);
    </script>
</body>
</html>
